<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galxy</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; background: #000; color: #fff; min-height: 100vh; position: relative; }
        .theme-toggle { position: fixed; top: 15px; right: 15px; font-size: 1.5em; cursor: pointer; z-index: 100; background: rgba(0, 0, 0, 0.2); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .container { display: flex; max-width: 1200px; margin: 0 auto; }
        .sidebar { width: 250px; background: rgba(20, 20, 20, 0.9); padding: 20px; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .sidebar h1 { text-align: center; margin-bottom: 20px; }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar li { margin: 10px 0; }
        .sidebar a { color: #fff; text-decoration: none; display: block; padding: 10px; border-radius: 5px; transition: background 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: rgba(255, 255, 255, 0.2); }
        .content { margin-left: 250px; padding: 20px; width: calc(100% - 250px); min-height: 100vh; box-sizing: border-box; position: relative; }
        .section { display: none; }
        .section.active { display: block; }
        .reset-btn { position: absolute; top: 20px; right: 20px; background: #ff4757; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .reset-btn:hover { background: #ff6b81; }
        .link-form { display: flex; gap: 10px; margin-bottom: 20px; }
        .link-form input { padding: 10px; border: none; border-radius: 5px; flex: 1; background: rgba(40, 40, 40, 0.7); color: #fff; }
        .link-form button { padding: 10px 20px; background: #667eea; color: #fff; border: none; border-radius: 5px; cursor: pointer; transition: background 0.3s; }
        .link-form button:hover { background: #764ba2; }
        .links { display: flex; flex-direction: column; gap: 10px; }
        .link-item { display: flex; justify-content: space-between; align-items: center; background: rgba(40, 40, 40, 0.7); padding: 10px; border-radius: 5px; }
        .link-item a { color: #fff; text-decoration: none; flex: 1; }
        .price-container { display: flex; align-items: center; gap: 10px; }
        .price-tag { font-size: 0.9em; color: #2ed573; font-weight: bold; }
        .click-counter { font-size: 0.8em; color: rgba(255, 255, 255, 0.7); margin-right: 10px; }
        .link-item button { background: #ff4757; color: #fff; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-left: 10px; }
        .buy-btn { background: #667eea !important; border-radius: 5px !important; width: auto !important; height: auto !important; padding: 5px 15px !important; }
        body.light-mode { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); color: #333; }
        body.light-mode .sidebar { background: rgba(255, 255, 255, 0.8); color: #333; }
        body.light-mode .sidebar a { color: #333; }
        body.light-mode .link-item { background: rgba(0, 0, 0, 0.05); color: #333; }
        body.light-mode .link-item a { color: #333; }
        body.light-mode .link-form input { background: rgba(255, 255, 255, 0.7); color: #333; }
        @media (max-width: 768px) { .sidebar { width: 100%; position: relative; height: auto; } .content { margin-left: 0; width: 100%; } .reset-btn { position: static; margin-bottom: 20px; display: block; width: 100%; } }
    </style>
</head>
<body>
    <div class="theme-toggle" id="theme-toggle-btn">☀️</div>
    <div class="container">
        <nav class="sidebar">
            <h1>Galxy</h1>
            <ul>
                <li><a href="#" data-section="Home" class="active">Home</a></li>
                <li><a href="#" data-section="Store">Store</a></li>
                <li><a href="#" data-section="Proxies">Proxies</a></li>
                <li><a href="#" data-section="Games">Games</a></li>
                <li><a href="#" data-section="Other">Other</a></li>
            </ul>
        </nav>
        <main class="content">
            <div id="Home" class="section active">
                <button class="reset-btn" id="reset-account">Reset Account</button>
                <h2>Welcome to Galxy!</h2>
                <p>Organize and access your favorite links in one place.</p>
            </div>
            <div id="Store" class="section">
                <h2>Store</h2>
                <div id="store-list" class="links"></div>
            </div>
            <div id="Proxies" class="section">
                <h2>Proxies</h2>
                <div class="link-form">
                    <input type="text" id="proxy-name" placeholder="Link Name">
                    <input type="text" id="proxy-url" placeholder="URL">
                    <button id="add-proxy">Add</button>
                </div>
                <div id="proxy-links" class="links"></div>
            </div>
            <div id="Games" class="section">
                <h2>Games</h2>
                <div class="link-form">
                    <input type="text" id="game-name" placeholder="Link Name">
                    <input type="text" id="game-url" placeholder="URL">
                    <button id="add-game">Add</button>
                </div>
                <div id="game-links" class="links"></div>
            </div>
            <div id="Other" class="section">
                <h2>Other</h2>
                <div class="link-form">
                    <input type="text" id="other-name" placeholder="Link Name">
                    <input type="text" id="other-url" placeholder="URL">
                    <button id="add-other">Add</button>
                </div>
                <div id="other-links" class="links"></div>
            </div>
        </main>
    </div>
    <script>
        const HARDCODED_STORE = [
            { name: "dogehub", price: "$2", url: "https://deltamath.interdoge.cfd.cdn.cloudflare.net/" },
            { name: "suntree", price: "$2", url: "https://ixl.math.nwpa.com.au" },
            { name: "petezah", price: "$3", url: "https://nice.kubota-lab.com" },
            { name: "Space", price: "$3", url: "https://planets.is-a.software.cdn.cloudflare.net" },
            { name: "Interstellar", price: "$4", url: "https://welove.vcsa.eleomedio-coach.hu/" }
        ];

        document.addEventListener("DOMContentLoaded", () => {
            const sections = document.querySelectorAll(".section");
            const navLinks = document.querySelectorAll(".sidebar a");
            const storeContainer = document.getElementById("store-list");
            const linkContainers = {
                Proxies: document.getElementById("proxy-links"),
                Games: document.getElementById("game-links"),
                Other: document.getElementById("other-links")
            };

            function renderStore() {
                const purchased = JSON.parse(localStorage.getItem('purchasedItems')) || [];
                storeContainer.innerHTML = "";
                HARDCODED_STORE.forEach((item, index) => {
                    if (purchased.includes(item.name)) return;
                    const itemEl = document.createElement("div");
                    itemEl.className = "link-item";
                    itemEl.innerHTML = `<span>${item.name}</span><div class="price-container"><span class="price-tag">${item.price}</span><button class="buy-btn" onclick="handlePurchase(${index})">Buy</button></div>`;
                    storeContainer.appendChild(itemEl);
                });
            }

            window.handlePurchase = function(index) {
                const item = HARDCODED_STORE[index];
                if (!item.url) { alert("No link associated with this item yet."); return; }
                const pw = prompt("Enter password to purchase " + item.name + ":");
                if (pw === '31Litbro=me1') {
                    const purchased = JSON.parse(localStorage.getItem('purchasedItems')) || [];
                    purchased.push(item.name);
                    localStorage.setItem('purchasedItems', JSON.stringify(purchased));
                    const data = JSON.parse(localStorage.getItem('swirlLinks')) || { Proxies: [], Games: [], Other: [] };
                    data.Proxies.push({ name: item.name, url: item.url, clicks: 0 });
                    localStorage.setItem('swirlLinks', JSON.stringify(data));
                    renderStore();
                    loadLinks();
                    alert(item.name + " added to your Proxies!");
                } else if (pw !== null) { alert("Incorrect password."); }
            };

            document.getElementById("reset-account").onclick = () => {
                if(confirm("Are you sure? This will remove all your saved links and reset your store purchases. Your theme settings will stay.")) {
                    localStorage.setItem('swirlLinks', JSON.stringify({ Proxies: [], Games: [], Other: [] }));
                    localStorage.setItem('purchasedItems', JSON.stringify([]));
                    renderStore();
                    loadLinks();
                    alert("Account reset successfully.");
                }
            };

            function loadLinks() {
                const data = JSON.parse(localStorage.getItem('swirlLinks')) || { Proxies: [], Games: [], Other: [] };
                for (const section in linkContainers) { renderLinks(section, data[section] || []); }
            }

            function renderLinks(section, links) {
                linkContainers[section].innerHTML = "";
                links.forEach((link, index) => {
                    const linkElement = document.createElement("div");
                    linkElement.className = "link-item";
                    linkElement.innerHTML = `<a href="${link.url}" target="_blank" onclick="window.trackLinkClick('${section}', ${index})">${link.name}</a><span class="click-counter">${link.clicks || 0} clicks</span><button onclick="window.deleteLink('${section}', ${index})">×</button><button onclick="window.copyLink('${link.url}')">📋</button>`;
                    linkContainers[section].appendChild(linkElement);
                });
            }

            window.deleteLink = function(section, index) {
                const data = JSON.parse(localStorage.getItem('swirlLinks'));
                data[section].splice(index, 1);
                localStorage.setItem('swirlLinks', JSON.stringify(data));
                loadLinks();
            };

            window.copyLink = function(url) {
                navigator.clipboard.writeText(url).then(() => alert("Copied!")).catch(err => alert("Error"));
            };

            window.trackLinkClick = function(section, index) {
                const data = JSON.parse(localStorage.getItem('swirlLinks'));
                data[section][index].clicks = (data[section][index].clicks || 0) + 1;
                localStorage.setItem('swirlLinks', JSON.stringify(data));
                loadLinks();
            };

            function addLink(section) {
                const name = document.getElementById(section.toLowerCase().slice(0,-1) + "-name").value.trim();
                let url = document.getElementById(section.toLowerCase().slice(0,-1) + "-url").value.trim();
                if (!name || !url) return;
                if (!url.startsWith("http")) url = "https://" + url;
                const data = JSON.parse(localStorage.getItem('swirlLinks')) || { Proxies: [], Games: [], Other: [] };
                data[section].push({ name, url, clicks: 0 });
                localStorage.setItem('swirlLinks', JSON.stringify(data));
                document.getElementById(section.toLowerCase().slice(0,-1) + "-name").value = "";
                document.getElementById(section.toLowerCase().slice(0,-1) + "-url").value = "";
                loadLinks();
            }

            document.getElementById("add-proxy").onclick = () => addLink("Proxies");
            document.getElementById("add-game").onclick = () => addLink("Games");
            document.getElementById("add-other").onclick = () => addLink("Other");

            navLinks.forEach(link => {
                link.addEventListener("click", (e) => {
                    e.preventDefault();
                    navLinks.forEach(l => l.classList.remove("active"));
                    link.classList.add("active");
                    sections.forEach(s => s.classList.remove("active"));
                    document.getElementById(link.dataset.section).classList.add("active");
                });
            });

            const themeToggleBtn = document.getElementById('theme-toggle-btn');
            themeToggleBtn.onclick = () => {
                document.body.classList.toggle('light-mode');
                localStorage.setItem('swirlTheme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
            };

            if (localStorage.getItem('swirlTheme') === 'light') document.body.classList.add('light-mode');

            renderStore();
            loadLinks();
        });
    </script>
</body>
</html>
