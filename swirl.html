<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌀 SWIRL 🌀</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e90ff, #0066cc);
            color: white;
            margin: 0;
            padding: 0;
            transition: background 0.3s;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 200px;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
        }
        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.5em;
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
        }
        .sidebar li {
            margin-bottom: 15px;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            padding: 8px;
            border-radius: 5px;
            transition: all 0.2s;
            display: block;
        }
        .sidebar a:hover, .sidebar a.active {
            background: rgba(255, 255, 255, 0.2);
            text-decoration: none;
        }
        .content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }
        .section {
            display: none;
        }
        .section.active {
            display: block;
        }
        .link-list {
            margin-top: 20px;
        }
        .link-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 10px;
            border-radius: 5px;
            transition: all 0.2s;
        }
        .link-item:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .link-item a {
            color: white;
            text-decoration: none;
            flex: 1;
        }
        .delete-btn, .copy-btn {
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 3px;
            padding: 3px 8px;
            cursor: pointer;
            margin-left: 10px;
            transition: all 0.2s;
        }
        .copy-btn {
            background: #00cc66;
        }
        .delete-btn:hover {
            background: #ff0000;
        }
        .copy-btn:hover {
            background: #00aa55;
        }
        .add-link {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .add-link input {
            padding: 8px;
            border: none;
            border-radius: 5px;
            flex: 1;
        }
        .add-link button {
            padding: 8px 15px;
            background: #00cc66;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .add-link button:hover {
            background: #00aa55;
        }
        .about {
            text-align: center;
            margin-top: 50px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                display: flex;
                justify-content: space-around;
                padding: 10px;
            }
            .sidebar ul {
                display: flex;
                width: 100%;
                justify-content: space-around;
                padding: 0;
            }
            .sidebar li {
                margin: 0;
            }
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>🌀 SWIRL 🌀</h2>
            <ul>
                <li><a href="#" data-section="home">Home</a></li>
                <li><a href="#" data-section="proxies">Proxies</a></li>
                <li><a href="#" data-section="games">Games</a></li>
                <li><a href="#" data-section="other">Other</a></li>
            </ul>
        </div>
        <div class="content">
            <div id="home" class="section active">
                <h1>Welcome to 🌀 SWIRL 🌀</h1>
                <div class="about">
                    <h2>About</h2>
                    <p>🌀 SWIRL 🌀 is your go-to hub for unblocked sites and games at school. Add your favorite links to each section and access them anytime!</p>
                </div>
            </div>
            <div id="proxies" class="section">
                <h1>Proxies</h1>
                <div class="link-list" id="proxies-list"></div>
                <div class="add-link">
                    <input type="text" id="proxy-name" placeholder="Link name">
                    <input type="text" id="proxy-url" placeholder="Link URL (include http:// or https://)">
                    <button id="add-proxy">Add</button>
                </div>
            </div>
            <div id="games" class="section">
                <h1>Games</h1>
                <div class="link-list" id="games-list"></div>
                <div class="add-link">
                    <input type="text" id="game-name" placeholder="Link name">
                    <input type="text" id="game-url" placeholder="Link URL (include http:// or https://)">
                    <button id="add-game">Add</button>
                </div>
            </div>
            <div id="other" class="section">
                <h1>Other</h1>
                <div class="link-list" id="other-list"></div>
                <div class="add-link">
                    <input type="text" id="other-name" placeholder="Link name">
                    <input type="text" id="other-url" placeholder="Link URL (include http:// or https://)">
                    <button id="add-other">Add</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    const data = {
        proxies: [],
        games: [],
        other: []
    };

    const sections = document.querySelectorAll('.section');
    const navLinks = document.querySelectorAll('.sidebar a');
    const addButtons = {
        proxies: document.getElementById('add-proxy'),
        games: document.getElementById('add-game'),
        other: document.getElementById('add-other')
    };

    function init() {
        const savedData = localStorage.getItem('swirlData');
        if (savedData) {
            Object.assign(data, JSON.parse(savedData));
        }

        navLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const sectionId = link.getAttribute('data-section');
                showSection(sectionId);
            });
        });

        addButtons.proxies.addEventListener('click', () => addLink('proxies'));
        addButtons.games.addEventListener('click', () => addLink('games'));
        addButtons.other.addEventListener('click', () => addLink('other'));

        document.querySelectorAll('.link-list').forEach(list => {
            list.addEventListener('click', (e) => {
                if (e.target.classList.contains('delete-btn')) {
                    const section = list.id.replace('-list', '');
                    const index = e.target.getAttribute('data-index');
                    deleteLink(section, index);
                }
                if (e.target.classList.contains('copy-btn')) {
                    const url = e.target.getAttribute('data-url');
                    navigator.clipboard.writeText(url).then(() => alert('Link copied to clipboard!'));
                }
            });
        });

        showSection('home');
        updateUI('proxies');
        updateUI('games');
        updateUI('other');
    }

    function showSection(sectionId) {
        sections.forEach(section => {
            section.classList.remove('active');
        });
        document.getElementById(sectionId).classList.add('active');

        navLinks.forEach(link => {
            link.classList.remove('active');
            if (link.getAttribute('data-section') === sectionId) {
                link.classList.add('active');
            }
        });
    }

    function addLink(section) {
        const nameInput = document.getElementById(`${section}-name`);
        const urlInput = document.getElementById(`${section}-url`);
        const name = nameInput.value.trim();
        let url = urlInput.value.trim();

        if (!name || !url) {
            alert('Please enter both a name and URL!');
            return;
        }

        if (!url.startsWith('http://') && !url.startsWith('https://')) {
            url = 'https://' + url;
        }

        try {
            new URL(url);
        } catch (e) {
            alert('Please enter a valid URL (e.g., https://example.com)');
            return;
        }

        data[section].push({ name, url });
        updateUI(section);
        nameInput.value = '';
        urlInput.value = '';
    }

    function deleteLink(section, index) {
        if (confirm('Are you sure you want to delete this link?')) {
            data[section].splice(index, 1);
            updateUI(section);
        }
    }

    function updateUI(section) {
        const listElement = document.getElementById(`${section}-list`);
        listElement.innerHTML = '';

        data[section].forEach((link, index) => {
            const div = document.createElement('div');
            div.className = 'link-item';
            div.innerHTML = `
                <a href="${link.url}" target="_blank">${link.name}</a>
                <button class="delete-btn" data-index="${index}">×</button>
                <button class="copy-btn" data-url="${link.url}">📋</button>
            `;
            listElement.appendChild(div);
        });

        localStorage.setItem('swirlData', JSON.stringify(data));
    }

    init();
</script>

</body>
</html>
